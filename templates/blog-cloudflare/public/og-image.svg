<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="40%" stop-color="#0f1d3d"/>
      <stop offset="100%" stop-color="#1a1045"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="30%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="70%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- TP Logo circle -->
  <circle cx="600" cy="220" r="70" fill="#4B8BD4" opacity="0.9"/>
  <circle cx="600" cy="220" r="78" fill="none" stroke="#4B8BD4" stroke-width="5" opacity="0.7"/>

  <!-- Title -->
  <text x="600" y="360" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="900" font-size="52" fill="#ffffff" letter-spacing="-2">Your website, built by AI</text>

  <!-- Subtitle -->
  <text x="600" y="410" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="400" font-size="22" fill="#94a3b8">Describe your vision. AI creates everything. Published instantly.</text>

  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="600" font-size="18" fill="#60a5fa">token-press.com</text>

  <!-- Badge -->
  <rect x="490" y="465" width="220" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="512" cy="483" r="4" fill="#34d399"/>
  <text x="600" y="489" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="500" font-size="13" fill="#93c5fd">AI-Powered Website Builder</text>
</svg>
